name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check generator/src generator/tests

      - name: Format check (ruff)
        run: uv run ruff format --check generator/src generator/tests

      - name: Unit tests
        run: uv run pytest generator/tests/unit -v --tb=short

  smoke:
    name: Generator smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run XS backfill
        run: |
          uv run python -m csnp_retail generate \
            --mode backfill \
            --scale xs \
            --out ./data/ \
            --seed 42
          ls -lh ./data/*.parquet
