name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uv run ruff check generator/src generator/tests helpers/src helpers/tests

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uv run pytest generator/tests helpers/tests -q -m "not fabric_integration"
