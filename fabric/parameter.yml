# fabric-cicd parameterization rules.
#
# Schema reference: https://microsoft.github.io/fabric-cicd/latest/how_to/parameterization/
#
# Environment keys (DEV / TEST / PROD) are case-sensitive and must match the
# `environment` argument passed to FabricWorkspace by deploy.deploy.
#
# This file is intentionally minimal for the initial Lakehouse-only deploy —
# Lakehouses don't carry workspace- or environment-specific IDs in their
# .platform files, so no replacements are needed yet.  Sections below are
# placeholders showing the structure for when notebooks, pipelines, and
# additional item types land.

find_replace:
  # Substitute the workspace_name parameter cell assignment per environment.
  # Matches only the exact parameter assignment line — not variable names or
  # comments that happen to include "CSNP_Dev".  Scoped to Notebook items only.
  # Lakehouse display names (CSNP_Bronze, CSNP_Silver, CSNP_Gold) are identical
  # across all three workspaces by design and require no substitution.
  - find_value: 'workspace_name: str = "CSNP_Dev"'
    replace_value:
      DEV:  'workspace_name: str = "CSNP_Dev"'
      TEST: 'workspace_name: str = "CSNP_Test"'
      PROD: 'workspace_name: str = "CSNP_Prod"'
    item_type: "Notebook"

  # Substitute the DEV workspace ID in pipeline-content.json for TEST/PROD.
  # Notebook IDs are workspace-specific; TEST/PROD values must be filled in
  # once those workspaces have the notebooks deployed.
  - find_value: '"workspaceId": "23d7d6a1-7272-4793-9abd-5a31dc1f575a"'
    replace_value:
      DEV:  '"workspaceId": "23d7d6a1-7272-4793-9abd-5a31dc1f575a"'
      TEST: '"workspaceId": "1aef2e26-2ebf-4dbc-8fa4-327bc04ff570"'
      PROD: '"workspaceId": "a09f61df-f8b6-4448-bb7e-290142b72213"'
    item_type: "DataPipeline"

key_value_replace: []
